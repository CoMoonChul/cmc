components:
  schemas:
    LiveCoding:
      type: object
      x-class-extra-annotation: "@jakarta.persistence.Entity"
      required:
        - id
        - language
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: |
            @jakarta.persistence.Id
            @jakarta.persistence.GeneratedValue(strategy = jakarta.persistence.GenerationType.IDENTITY)
        language:
          type: string
          x-field-extra-annotation: |
            @jakarta.persistence.Column(nullable = false, columnDefinition = "VARCHAR(255) COMMENT '코드 언어'")
        code:
          type: string
          x-field-extra-annotation: |
            @jakarta.persistence.Column(columnDefinition = "TEXT COMMENT '코드 내용'")
        createdAt:
          type: string
          format: date-time
          x-field-extra-annotation: |
            @jakarta.persistence.Column(nullable = false, columnDefinition = "TIMESTAMP COMMENT '생성 일시'")
        updatedAt:
          type: string
          format: date-time
          x-field-extra-annotation: |
            @jakarta.persistence.Column(nullable = false, columnDefinition = "TIMESTAMP COMMENT '수정 일시'")
