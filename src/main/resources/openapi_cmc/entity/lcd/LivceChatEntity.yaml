components:
  schemas:
    LiveChat:
      type: object
      x-class-extra-annotation: "@jakarta.persistence.Entity"
      required:
        - id
        - liveCoding
        - userId
        - message
        - timestamp
      properties:
        id:
          type: integer
          format: int64
          x-field-extra-annotation: |
            @jakarta.persistence.Id
            @jakarta.persistence.GeneratedValue(strategy = jakarta.persistence.GenerationType.IDENTITY)
        liveCoding:
          type: object
          x-field-extra-annotation: |
            @jakarta.persistence.ManyToOne
            @jakarta.persistence.JoinColumn(name = "live_coding_id", nullable = false)
        userId:
          type: string
          x-field-extra-annotation: |
            @jakarta.persistence.Column(nullable = false, columnDefinition = "VARCHAR(255) COMMENT '사용자 ID'")
        message:
          type: string
          x-field-extra-annotation: |
            @jakarta.persistence.Column(nullable = false, columnDefinition = "TEXT COMMENT '채팅 메시지 내용'")
        timestamp:
          type: string
          format: date-time
          x-field-extra-annotation: |
            @jakarta.persistence.Column(nullable = false, columnDefinition = "TIMESTAMP COMMENT '채팅 전송 일시'")
