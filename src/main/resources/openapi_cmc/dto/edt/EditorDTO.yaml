components:
  schemas:
    # Editor 코드 요청 DTO (코드 편집)
    EditorRequest:
      type: object
      required:
        - code
        - language
      properties:
        code:
          type: string
          description: 작성된 코드 내용
        language:
          type: string
          description: 코드 타입 (js/java)

    # Editor 코드 응답 DTO (편집된 코드 반환)
    EditorResponse:
      type: object
      required:
        - code
        - language
        - result
      properties:
        code:
          type: string
          description: 작성된 코드 내용
        language:
          type: string
          description: 코드 타입 (js/java)
        result:
          type: string
          description: 코드 실행 결과 (또는 상태)

    # Editor 실시간 업데이트 DTO (실시간 코드 변경 반영)
    EditorUpdateRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
          description: 실시간으로 변경된 코드 내용

    # Editor 에디터 상태 응답 DTO (에디터 상태 정보)
    EditorStatusResponse:
      type: object
      properties:
        code:
          type: string
          description: 현재 코드 내용
        language:
          type: string
          description: 코드 타입 (js/java)
        userId:
          type: string
          description: 코드 작성자의 사용자 ID
